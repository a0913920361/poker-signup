<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>揪友娛樂坊 — 週六娛樂局報名</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; justify-content: center; padding: 1.5rem 1rem 3rem; }
  .card { background: #fff; border-radius: 16px; padding: 1.75rem 1.5rem; width: 100%; max-width: 480px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
  .header { text-align: center; margin-bottom: 1.25rem; }
  .suits { font-size: 20px; letter-spacing: 6px; margin-bottom: 6px; }
  .s-b { color: #2C2C2A; } .s-r { color: #A32D2D; }
  .org { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; color: #A32D2D; line-height: 1.15; }
  .ev-title { font-size: 15px; font-weight: 500; color: #666; margin-top: 4px; }
  .sub { font-size: 11px; color: #aaa; margin-top: 3px; }
  .sec-label { font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: #999; margin: 1.25rem 0 .5rem; display: flex; align-items: center; gap: 5px; }
  .event-banner { background: #fff8f5; border: 1px solid #f0ddd5; border-radius: 12px; padding: 1rem 1.1rem; margin-bottom: 1.1rem; }
  .eb-title { font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: #c0714f; margin-bottom: .55rem; }
  .eb-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #444; padding: 2px 0; }
  .eb-val { font-weight: 500; color: #222; }
  .eb-empty { font-size: 12px; color: #ccc; text-align: center; padding: 4px 0; }
  .slot-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 1rem; }
  .slot-card { border: 1px solid #ddd; border-radius: 10px; background: #fff; padding: 10px 8px; text-align: center; cursor: pointer; transition: all .15s; -webkit-tap-highlight-color: transparent; }
  .slot-card:hover { background: #fafaf8; }
  .slot-card.active { border: 2px solid #A32D2D; }
  .sc-time { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; color: #222; display: block; }
  .slot-card.active .sc-time { color: #A32D2D; }
  .sc-tag { font-size: 10px; color: #aaa; display: block; margin-top: 2px; }
  .slot-card.active .sc-tag { color: #A32D2D; }
  .sc-info { font-size: 10px; color: #888; display: block; margin-top: 5px; line-height: 1.5; border-top: 1px solid #f0f0f0; padding-top: 5px; text-align: left; }
  .slot-card.active .sc-info { color: #A32D2D; border-top-color: #f5d5cc; }
  .sc-count { display: inline-block; margin-top: 4px; font-size: 10px; color: #bbb; }
  .slot-card.active .sc-count { color: #A32D2D; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: #666; }
  .field input, .field select { height: 38px; padding: 0 10px; border: 1px solid #ddd; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #222; background: #fff; outline: none; -webkit-appearance: none; }
  .field input:focus, .field select:focus { border-color: #A32D2D; }
  .field input::placeholder { color: #bbb; }
  .fee-row { display: flex; gap: 6px; }
  .fee-row input { flex: 1; } .fee-row select { width: 80px; flex-shrink: 0; }
  .input-row { display: flex; gap: 8px; margin-bottom: .75rem; }
  .input-row input { flex: 1; height: 42px; padding: 0 12px; border: 1px solid #ddd; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: #222; outline: none; }
  .input-row input:focus { border-color: #A32D2D; }
  .input-row input::placeholder { color: #bbb; }
  .btn-add { height: 42px; padding: 0 18px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: #222; cursor: pointer; white-space: nowrap; transition: background .15s; -webkit-tap-highlight-color: transparent; }
  .btn-add:hover { background: #f5f4f0; } .btn-add:active { transform: scale(0.97); }
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: .9rem 0; }
  .stat { background: #f5f4f0; border-radius: 8px; padding: .65rem; text-align: center; }
  .stat-n { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: #222; display: block; }
  .stat-l { font-size: 11px; color: #888; display: block; margin-top: 1px; }
  .player-list { display: flex; flex-direction: column; gap: 5px; }
  .p-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border: 1px solid #eee; border-radius: 8px; background: #fff; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }
  .p-item.wait { background: #fafaf8; border-style: dashed; }
  .p-suit { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; min-width: 22px; }
  .p-rank { font-size: 12px; color: #bbb; min-width: 18px; }
  .p-name { flex: 1; font-size: 15px; font-weight: 500; color: #222; }
  .p-item.wait .p-name { color: #888; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
  .badge-full { background: #eaf3de; color: #3B6D11; } .badge-wait { background: #faeeda; color: #854F0B; }
  .rm-btn { background: none; border: none; cursor: pointer; color: #ccc; font-size: 15px; line-height: 1; padding: 2px 4px; border-radius: 4px; transition: all .15s; }
  .rm-btn:hover { color: #A32D2D; background: #fcebeb; }
  .divider { border: none; border-top: 1px solid #eee; margin: 1.25rem 0; }
  .preview { background: #f5f4f0; border: 1px solid #e5e3de; border-radius: 10px; padding: 13px 15px; font-size: 13px; line-height: 1.9; color: #333; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; min-height: 80px; max-height: 320px; overflow-y: auto; }
  .btn-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-top: 10px; }
  .btn-copy { height: 44px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: #222; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: background .15s; }
  .btn-copy:hover { background: #f5f4f0; } .btn-copy.ok { color: #3B6D11; border-color: #639922; }
  .btn-reset { height: 44px; padding: 0 14px; border: 1px solid #eee; border-radius: 8px; background: none; font-family: 'DM Sans', sans-serif; font-size: 13px; color: #aaa; cursor: pointer; white-space: nowrap; transition: all .15s; }
  .btn-reset:hover { color: #A32D2D; border-color: #A32D2D; background: #fcebeb; }
  .status-bar { text-align: center; font-size: 11px; color: #bbb; margin-top: 1rem; }
  .status-bar.conn { color: #3B6D11; } .status-bar.err { color: #A32D2D; }
  .empty { font-size: 13px; color: #bbb; text-align: center; padding: 10px 0; }
  .shake { animation: shake .3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .admin-toggle { text-align: center; margin-top: 1.5rem; }
  .admin-toggle button { background: none; border: none; font-size: 12px; color: #ccc; cursor: pointer; text-decoration: underline; }
  .admin-panel { margin-top: .75rem; padding: 1rem; background: #fafaf8; border: 1px dashed #ddd; border-radius: 10px; display: none; }
  .admin-panel.show { display: block; }
  .admin-panel .field { margin-bottom: .5rem; }
  .admin-panel .field label { font-size: 12px; color: #888; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 998; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.88); background: #fff; border-radius: 20px; padding: 2rem 2.5rem; text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,0.18); z-index: 999; opacity: 0; pointer-events: none; transition: all .28s cubic-bezier(.34,1.56,.64,1); min-width: 240px; max-width: 320px; width: 90%; }
  .modal.show { opacity: 1; transform: translate(-50%,-50%) scale(1); pointer-events: auto; }
  .modal-icon { font-size: 40px; display: block; margin-bottom: 10px; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: #222; display: block; margin-bottom: 6px; }
  .modal-sub { font-size: 13px; color: #888; display: block; line-height: 1.6; margin-bottom: 10px; white-space: pre-line; }
  .modal-input { width: 100%; height: 38px; padding: 0 10px; border: 1px solid #ddd; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #222; outline: none; margin-bottom: 6px; }
  .modal-input:focus { border-color: #A32D2D; }
  .modal-hint { font-size: 11px; color: #A32D2D; margin-bottom: 8px; display: none; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btn { flex: 1; height: 38px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
  .modal-btn.danger { border-color: #A32D2D; color: #A32D2D; }
  .modal-btn.danger:hover { background: #fcebeb; }
  .modal-btn.cancel { color: #aaa; }
  .modal-btn.cancel:hover { background: #f5f4f0; }
  .pw-box { display:flex; gap:8px; margin-top:.5rem; }
  .pw-box input { flex:1; height:38px; padding:0 10px; border:1px solid #ddd; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; color:#222; outline:none; }
  .pw-box input:focus { border-color:#A32D2D; }
  .pw-box button { height:38px; padding:0 14px; border:1px solid #ddd; border-radius:8px; background:#fff; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; color:#222; cursor:pointer; }
  .pw-hint { font-size:11px; color:#A32D2D; margin-top:4px; display:none; }
  .admin-slot-tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:.75rem; }
  .ast { height:34px; border:1px solid #ddd; border-radius:8px; background:#fff; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; color:#888; cursor:pointer; transition:all .15s; }
  .ast.active { border-color:#A32D2D; color:#A32D2D; background:#fff8f8; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="suits"><span class="s-b">♠</span><span class="s-r">♥</span><span class="s-r">♦</span><span class="s-b">♣</span></div>
    <div class="org">揪友娛樂坊</div>
    <div class="ev-title">週六娛樂局</div>
    <div class="sub">Texas Hold'em Tournament</div>
  </div>
  <div class="event-banner" id="eventBanner">
    <div class="eb-title">♠ 本週賽事資訊</div>
    <div id="ebContent"><div class="eb-empty">主辦人尚未設定賽事資訊</div></div>
  </div>
  <div class="sec-label">🕐 選擇時段報名</div>
  <div class="slot-cards">
    <div class="slot-card" id="slot-0" onclick="selectSlot(0)"><span class="sc-time" id="st-0">下午 3:00</span><span class="sc-tag">第一場</span><span class="sc-info" id="si-0" style="display:none"></span><span class="sc-count" id="sc-0"></span></div>
    <div class="slot-card" id="slot-1" onclick="selectSlot(1)"><span class="sc-time" id="st-1">下午 6:00</span><span class="sc-tag">第二場</span><span class="sc-info" id="si-1" style="display:none"></span><span class="sc-count" id="sc-1"></span></div>
    <div class="slot-card" id="slot-2" onclick="selectSlot(2)"><span class="sc-time" id="st-2">下午 9:00</span><span class="sc-tag">第三場</span><span class="sc-info" id="si-2" style="display:none"></span><span class="sc-count" id="sc-2"></span></div>
  </div>
  <div id="signupArea" style="display:none">
    <div class="sec-label">👤 玩家報名</div>
    <div class="input-row">
      <input type="text" id="nameInput" placeholder="輸入你的名字..." maxlength="20" />
      <button class="btn-add" onclick="addPlayer()">＋ 報名</button>
    </div>
    <div class="stats">
      <div class="stat"><span class="stat-n" id="mainCount">0</span><span class="stat-l">已報名</span></div>
      <div class="stat"><span class="stat-n" id="waitCount">0</span><span class="stat-l">候補人數</span></div>
      <div class="stat"><span class="stat-n" id="seatLeft">10</span><span class="stat-l">剩餘座位</span></div>
    </div>
    <div class="sec-label">♠ 正式玩家</div>
    <div class="player-list" id="mainList"><div class="empty">尚未有人報名</div></div>
    <div id="waitSection" style="display:none">
      <div class="sec-label">⏳ 候補名單</div>
      <div class="player-list" id="waitList"></div>
    </div>
    <div class="divider"></div>
    <div class="sec-label">💬 LINE 訊息預覽</div>
    <div class="preview" id="preview">請先選擇時段</div>
    <div class="btn-row">
      <button class="btn-copy" id="copyBtn" onclick="copyMsg()">📋 複製到剪貼簿</button>
      <button class="btn-reset" onclick="showResetModal()">🔄 清空所有名單</button>
    </div>
  </div>
  <div class="status-bar" id="statusBar">連線中...</div>
  <div class="admin-toggle"><button onclick="toggleAdmin()">⚙ 主辦人設定</button></div>
  <div class="admin-panel" id="adminPanel">
    <div id="pwSection">
      <div style="font-size:13px;color:#888;margin-bottom:6px">請輸入主辦人密碼</div>
      <div class="pw-box"><input type="password" id="pwInput" placeholder="密碼" onkeydown="if(event.key==='Enter')checkPw()" /><button onclick="checkPw()">確認</button></div>
      <div class="pw-hint" id="pwHint">密碼錯誤，請再試一次</div>
    </div>
    <div id="adminContent" style="display:none">
      <div style="font-size:12px;color:#888;margin-bottom:.5rem">選擇要設定的場次：</div>
      <div class="admin-slot-tabs">
        <button class="ast active" id="ast-0" onclick="switchAdminSlot(0)">第一場</button>
        <button class="ast" id="ast-1" onclick="switchAdminSlot(1)">第二場</button>
        <button class="ast" id="ast-2" onclick="switchAdminSlot(2)">第三場</button>
      </div>
      <div class="info-grid">
        <div class="field"><label>📅 比賽日期</label><input type="date" id="eventDate" oninput="saveSettings()" /></div>
        <div class="field"><label>🕐 比賽時間</label><input type="time" id="eventTime" oninput="saveSettings()" /></div>
        <div class="field"><label>📍 地點</label><input type="text" id="eventPlace" placeholder="老王家、某會所" maxlength="30" oninput="saveSettings()" /></div>
        <div class="field"><label>💰 報名費</label>
          <div class="fee-row">
            <input type="number" id="feeAmount" placeholder="0" min="0" oninput="saveSettings()" />
            <select id="feeCurrency" onchange="saveSettings()"><option value="NTD">NTD</option><option value="USD">USD</option><option value="CNY">CNY</option><option value="籌碼">籌碼</option></select>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
  <span class="modal-icon" id="modalIcon">🎉</span>
  <span class="modal-title" id="modalTitle"></span>
  <span class="modal-sub" id="modalSub"></span>
  <input type="text" class="modal-input" id="modalInput" style="display:none" />
  <div class="modal-hint" id="modalHint"></div>
  <div class="modal-btns" id="modalBtns" style="display:none">
    <button class="modal-btn cancel" onclick="closeModal()">取消</button>
    <button class="modal-btn danger" id="modalConfirmBtn" onclick="modalConfirm()">確認</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const firebaseConfig = {
  apiKey: "AIzaSyCDyHKKlRDVALmW-a1kQ5MrlKkRHfqo3i4",
  authDomain: "jo-poker.firebaseapp.com",
  databaseURL: "https://jo-poker-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "jo-poker",
  storageBucket: "jo-poker.firebasestorage.app",
  messagingSenderId: "1046173492379",
  appId: "1:1046173492379:web:e6eaebda81222cffcdd23e"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const SUITS=['♠','♥','♦','♣','♠','♥','♦','♣','♠','♥'];
const RANKS=['A','K','Q','J','10','9','8','7','6','5'];
const SLOT_KEYS=['slot0','slot1','slot2'];
const DEFAULT_TIMES=['15:00','18:00','21:00'];
const ADMIN_PW='4560603';
let activeSlot=null, adminSlot=0, currentData={players:[],waitlist:[]}, adminUnlocked=false;
let allSlotData=[{},{},{}];
let modalMode=null, pendingRemove=null;

function setStatus(msg,type=''){const el=document.getElementById('statusBar');el.textContent=msg;el.className='status-bar '+type;}
function fmtTime(s){if(!s)return'';const[h,m]=s.split(':');const hour=parseInt(h);const p=hour<12?'上午':'下午';const h12=hour===0?12:hour>12?hour-12:hour;return`${p} ${h12}:${m}`;}
function slotTime(i){const t=allSlotData[i]?.settings?.time;return fmtTime(t||DEFAULT_TIMES[i]);}

function openModal(icon,title,sub,inputPlaceholder,confirmText,mode){
  modalMode=mode;
  document.getElementById('modalIcon').textContent=icon;
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalSub').textContent=sub;
  document.getElementById('modalHint').style.display='none';
  const inp=document.getElementById('modalInput');
  if(inputPlaceholder){inp.style.display='block';inp.value='';inp.placeholder=inputPlaceholder;setTimeout(()=>inp.focus(),100);}
  else inp.style.display='none';
  document.getElementById('modalConfirmBtn').textContent=confirmText;
  document.getElementById('modalBtns').style.display='flex';
  document.getElementById('modal').classList.add('show');
  document.getElementById('overlay').classList.add('show');
}

window.closeModal=function(){
  document.getElementById('modal').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
  modalMode=null; pendingRemove=null;
};

window.modalConfirm=function(){
  if(modalMode==='reset'){
    const val=document.getElementById('modalInput').value.trim();
    if(val!==ADMIN_PW){
      document.getElementById('modalHint').textContent='密碼錯誤，請再試一次';
      document.getElementById('modalHint').style.display='block';
      document.getElementById('modalInput').value='';
      document.getElementById('modalInput').classList.add('shake');
      setTimeout(()=>document.getElementById('modalInput').classList.remove('shake'),400);
      return;
    }
    SLOT_KEYS.forEach((key,i)=>{
      const s=allSlotData[i]?.settings||{};
      set(ref(db,key),{players:[],waitlist:[],settings:s});
    });
    window.closeModal();
    openModal('✅','清空完成！','三個時段的報名名單已全部清除','','','info');
    setTimeout(window.closeModal,2000);
  }
  else if(modalMode==='remove'){
    if(!pendingRemove)return;
    if(!adminUnlocked){
      const val=document.getElementById('modalInput').value.trim();
      if(val!==pendingRemove.name){
        document.getElementById('modalHint').textContent='名字不符，請重新輸入';
        document.getElementById('modalHint').style.display='block';
        document.getElementById('modalInput').value='';
        document.getElementById('modalInput').classList.add('shake');
        setTimeout(()=>document.getElementById('modalInput').classList.remove('shake'),400);
        return;
      }
    }
    const{type,idx}=pendingRemove;
    if(type==='main'){currentData.players.splice(idx,1);if(currentData.waitlist.length>0)currentData.players.push(currentData.waitlist.shift());}
    else currentData.waitlist.splice(idx,1);
    const s=allSlotData[activeSlot]?.settings||{};
    set(ref(db,SLOT_KEYS[activeSlot]),{players:currentData.players,waitlist:currentData.waitlist,settings:s});
    window.closeModal();
  }
  else if(modalMode==='info'){
    window.closeModal();
  }
};

window.showResetModal=function(){
  openModal('🗑️','清空所有報名名單','請輸入主辦人密碼以確認清空\n（三個時段全部清除）','輸入密碼...','確認清空','reset');
};

[0,1,2].forEach(i=>{
  onValue(ref(db,SLOT_KEYS[i]),snap=>{
    allSlotData[i]=snap.val()||{};
    updateSlotCard(i);
    updateEventBanner();
    if(activeSlot===i){currentData={players:allSlotData[i].players||[],waitlist:allSlotData[i].waitlist||[]};render();}
    if(adminSlot===i&&adminUnlocked)loadSettingsToForm(allSlotData[i].settings);
    setStatus('✓ 即時同步中','conn');
  },()=>setStatus('連線失敗，請重新整理','err'));
});

function updateEventBanner(){
  let found=null;
  for(let i=0;i<3;i++){if(allSlotData[i]?.settings?.date||allSlotData[i]?.settings?.place||allSlotData[i]?.settings?.fee){found=allSlotData[i].settings;break;}}
  const box=document.getElementById('ebContent');
  if(!found){box.innerHTML='<div class="eb-empty">主辦人尚未設定賽事資訊</div>';return;}
  let html='';
  if(found.date)html+=`<div class="eb-row"><span>📅</span><span class="eb-val">${fmtDate(found.date)}</span></div>`;
  if(found.place)html+=`<div class="eb-row"><span>📍</span><span class="eb-val">${esc(found.place)}</span></div>`;
  if(found.fee)html+=`<div class="eb-row"><span>💰</span><span class="eb-val">報名費 ${Number(found.fee).toLocaleString()} ${found.currency||'NTD'}</span></div>`;
  box.innerHTML=html||'<div class="eb-empty">主辦人尚未設定賽事資訊</div>';
}

function updateSlotCard(i){
  const d=allSlotData[i];const s=d.settings||{};const p=(d.players||[]).length;
  const st=document.getElementById('st-'+i);
  if(st)st.textContent=slotTime(i);
  const si=document.getElementById('si-'+i);
  let info='';
  if(s.place)info+=`📍 ${esc(s.place)}\n`;
  if(s.fee)info+=`💰 ${Number(s.fee).toLocaleString()} ${s.currency||'NTD'}`;
  si.textContent=info;si.style.display=info?'block':'none';
  const sc=document.getElementById('sc-'+i);
  if(p===0)sc.textContent='';else if(p>=10)sc.textContent='🔴 已額滿';else sc.textContent=`${p}/10 人`;
}

function loadSettingsToForm(s){
  document.getElementById('eventDate').value=s?.date||'';
  document.getElementById('eventTime').value=s?.time||'';
  document.getElementById('eventPlace').value=s?.place||'';
  document.getElementById('feeAmount').value=s?.fee||'';
  document.getElementById('feeCurrency').value=s?.currency||'NTD';
}

window.toggleAdmin=function(){
  const panel=document.getElementById('adminPanel');
  const isOpen=panel.classList.contains('show');
  if(isOpen){panel.classList.remove('show');adminUnlocked=false;document.getElementById('pwSection').style.display='block';document.getElementById('adminContent').style.display='none';document.getElementById('pwInput').value='';document.getElementById('pwHint').style.display='none';return;}
  panel.classList.add('show');
  if(!adminUnlocked)setTimeout(()=>document.getElementById('pwInput').focus(),100);
};

window.checkPw=function(){
  const val=document.getElementById('pwInput').value;
  if(val===ADMIN_PW){adminUnlocked=true;document.getElementById('pwSection').style.display='none';document.getElementById('adminContent').style.display='block';switchAdminSlot(0);}
  else{document.getElementById('pwHint').style.display='block';document.getElementById('pwInput').value='';document.getElementById('pwInput').classList.add('shake');setTimeout(()=>document.getElementById('pwInput').classList.remove('shake'),400);}
};

window.switchAdminSlot=function(idx){
  adminSlot=idx;[0,1,2].forEach(i=>document.getElementById('ast-'+i).classList.toggle('active',i===idx));
  loadSettingsToForm(allSlotData[idx]?.settings);
};

window.selectSlot=function(idx){
  activeSlot=idx;[0,1,2].forEach(i=>document.getElementById('slot-'+i).classList.toggle('active',i===idx));
  document.getElementById('signupArea').style.display='block';
  currentData={players:allSlotData[idx].players||[],waitlist:allSlotData[idx].waitlist||[]};
  render();
};

window.saveSettings=function(){
  if(!adminUnlocked)return;
  const s={
    date:document.getElementById('eventDate').value,
    time:document.getElementById('eventTime').value,
    place:document.getElementById('eventPlace').value.trim(),
    fee:document.getElementById('feeAmount').value,
    currency:document.getElementById('feeCurrency').value
  };
  const existing=allSlotData[adminSlot]||{};
  set(ref(db,SLOT_KEYS[adminSlot]),{players:existing.players||[],waitlist:existing.waitlist||[],settings:s});
};

window.addPlayer=function(){
  if(activeSlot===null)return;
  const input=document.getElementById('nameInput');
  const name=input.value.trim();
  if(!name)return;
  if(currentData.players.includes(name)||currentData.waitlist.includes(name)){
    input.classList.add('shake');input.style.borderColor='#A32D2D';
    setTimeout(()=>{input.classList.remove('shake');input.style.borderColor='';},400);
    openModal('⚠️','名字已存在',`「${name}」已在名單上了！`,'','','info');
    setTimeout(window.closeModal,2000);
    input.value='';return;
  }
  const isWait=currentData.players.length>=10;
  if(!isWait)currentData.players.push(name);else currentData.waitlist.push(name);
  input.value='';input.focus();
  const s=allSlotData[activeSlot]?.settings||{};
  set(ref(db,SLOT_KEYS[activeSlot]),{players:currentData.players,waitlist:currentData.waitlist,settings:s});
  if(!isWait){openModal('🎉','報名成功！',`${name} 是第 ${currentData.players.length} 位，座位已保留 ♠`,'','','info');setTimeout(window.closeModal,2500);}
  else{openModal('⏳','已加入候補',`${name} 是第 ${currentData.waitlist.length} 順位候補\n有人退出會自動遞補！`,'','','info');setTimeout(window.closeModal,2500);}
};

window.removePlayer=function(type,idx){
  const name=type==='main'?currentData.players[idx]:currentData.waitlist[idx];
  pendingRemove={type,idx,name};
  if(adminUnlocked){
    openModal('❓','確認取消報名',`確定要取消「${name}」的報名？`,'','確認取消','remove');
  } else {
    openModal('❓','取消報名確認',`請輸入你的名字\n以確認取消「${name}」的報名`,'輸入你的名字...','確認取消','remove');
  }
};

function render(){
  document.getElementById('mainCount').textContent=currentData.players.length;
  document.getElementById('waitCount').textContent=currentData.waitlist.length;
  document.getElementById('seatLeft').textContent=Math.max(0,10-currentData.players.length);
  const ml=document.getElementById('mainList');
  if(currentData.players.length===0){ml.innerHTML='<div class="empty">尚未有人報名，快來搶位子！</div>';}
  else{ml.innerHTML=currentData.players.map((p,i)=>`<div class="p-item"><span class="p-suit" style="color:${i%4===1||i%4===2?'#A32D2D':'#2C2C2A'}">${SUITS[i]}</span><span class="p-rank">${RANKS[i]}</span><span class="p-name">${esc(p)}</span>${currentData.players.length===10?'<span class="badge badge-full">滿座</span>':''}<button class="rm-btn" onclick="removePlayer('main',${i})">✕</button></div>`).join('');}
  const ws=document.getElementById('waitSection');
  if(currentData.waitlist.length===0){ws.style.display='none';}
  else{ws.style.display='block';document.getElementById('waitList').innerHTML=currentData.waitlist.map((p,i)=>`<div class="p-item wait"><span class="p-suit" style="color:#bbb">⏳</span><span class="p-rank">${i+1}</span><span class="p-name">${esc(p)}</span><span class="badge badge-wait">候補${i+1}</span><button class="rm-btn" onclick="removePlayer('wait',${i})">✕</button></div>`).join('');}
  updatePreview();
}

function updatePreview(){
  const box=document.getElementById('preview');
  if(activeSlot===null){box.textContent='請先選擇時段';return;}
  const s=allSlotData[activeSlot]?.settings||{};
  let msg='♠♥♦♣ 揪友娛樂坊 ♠♥♦♣\n🎰 週六娛樂局\n━━━━━━━━━━━━━━━━\n';
  if(s.date)msg+=`📅 日期：${fmtDate(s.date)}\n`;
  msg+=`🕐 時間：${slotTime(activeSlot)}\n`;
  if(s.place)msg+=`📍 地點：${s.place}\n`;
  if(s.fee)msg+=`💰 報名費：${Number(s.fee).toLocaleString()} ${s.currency||'NTD'}\n`;
  msg+='━━━━━━━━━━━━━━━━\n';
  msg+=`🃏 報名名單（${currentData.players.length}/10）\n`;
  if(currentData.players.length===0)msg+='（尚無人報名）\n';
  else currentData.players.forEach((p,i)=>{msg+=`${i+1}. ${p}\n`;});
  if(currentData.players.length<10)msg+=`\n👇 空位剩 ${10-currentData.players.length} 個，手刀來報名！\n`;
  else msg+='\n✅ 已額滿！\n';
  if(currentData.waitlist.length>0){msg+='━━━━━━━━━━━━━━━━\n';msg+=`⏳ 候補名單（${currentData.waitlist.length} 人）\n`;currentData.waitlist.forEach((p,i)=>{msg+=`候補${i+1}. ${p}\n`;});}
  msg+='━━━━━━━━━━━━━━━━\n♠♥♦♣ All in! ♠♥♦♣';
  box.textContent=msg;
}

window.copyMsg=function(){const text=document.getElementById('preview').textContent;if(text==='請先選擇時段')return;navigator.clipboard.writeText(text).then(()=>{const btn=document.getElementById('copyBtn');btn.classList.add('ok');btn.textContent='✅ 已複製！貼到 LINE 群組吧';setTimeout(()=>{btn.classList.remove('ok');btn.textContent='📋 複製到剪貼簿';},2500);});};
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');return`${parseInt(m)}月${parseInt(d)}日`;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')window.addPlayer();});
document.getElementById('modalInput').addEventListener('keydown',e=>{if(e.key==='Enter')window.modalConfirm();});
</script>
</body>
</html>
